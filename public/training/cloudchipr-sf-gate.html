<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudchipr SF — BA Lead Training Guide</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0a96b2 0%, #086b8a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  .logo { height: 32px; margin: 0 auto 20px; display: block; }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #0a96b2;
    font-weight: 700;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 22px;
    font-weight: 800;
    color: #1e293b;
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .sub {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 32px;
  }
  input[type="text"] {
    width: 100%;
    padding: 14px 18px;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 8px;
    text-align: center;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    outline: none;
    color: #1e293b;
    background: #f8fafc;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 16px;
    display: block;
  }
  input[type="text"].error {
    border-color: #ef4444;
    background: #fef2f2;
  }
  .error-msg {
    color: #ef4444;
    font-size: 12px;
    font-weight: 600;
    margin-top: -10px;
    margin-bottom: 12px;
    display: none;
  }
  .error-msg.show { display: block; }
  button {
    width: 100%;
    padding: 14px;
    background: #0a96b2;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s;
  }
  button:hover { background: #0882a0; }
  .footer-note {
    margin-top: 24px;
    font-size: 11px;
    color: #94a3b8;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.5s ease; }
</style>
</head>
<body>
<div class="card">
  <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 453.27 124.49">
    <path fill="#0a96b2" d="M170.35,32.1h14L206.74,85H191.13l-3.82-9.38H167.05L163.3,85H148Zm12.76,32.19-5.85-14.93-5.93,14.93Z"/>
    <path fill="#0a96b2" d="M208.1,30.23H223v10.5H208.1Zm.29,14.18h14.26V85H208.39Z"/>
    <path fill="#0a96b2" d="M227.75,44.41H242v8.18c2.33-5.55,6.08-9.16,12.83-8.86v15h-1.2C246.2,58.74,242,63,242,72.4V85H227.75Z"/>
    <path fill="#0a96b2" d="M258.29,32.48h42V45.23H272.84v8.94h24.83V66.25H272.84V85H258.29Z"/>
    <path fill="#0a96b2" d="M303.83,44.41h14.25v8.18c2.32-5.55,6.07-9.16,12.83-8.86v15h-1.2c-7.43,0-11.63,4.28-11.63,13.66V85H303.83Z"/>
    <path fill="#0a96b2" d="M332.64,64.89v-.15c0-11.85,8.47-21.23,20.47-21.23,14,0,20.48,10.28,20.48,22.21,0,.9,0,2-.07,2.93H346.36c1.13,4.42,4.35,6.67,8.78,6.67,3.38,0,6.08-1.27,9-4.12L372,77.73c-3.9,5-9.53,8.25-17.63,8.25C341.64,86,332.64,77.5,332.64,64.89Zm27.6-3.52c-.52-4.5-3.15-7.36-7.05-7.36s-6.3,2.93-7.05,7.36Z"/>
    <path fill="#0a96b2" d="M374.65,79.9,380,71.27a26.34,26.34,0,0,0,13.95,4.66c2.47,0,3.6-.75,3.6-2.18V73.6c0-1.58-2.25-2.25-6.53-3.45-8-2.1-14.4-4.8-14.4-13V57c0-8.63,6.9-13.44,16.28-13.44a31.77,31.77,0,0,1,16.73,4.73l-4.88,9c-4.2-2.33-8.78-3.76-12-3.76-2.18,0-3.3.83-3.3,2v.14c0,1.58,2.32,2.33,6.6,3.61,8,2.25,14.4,5,14.4,12.9v.15c0,8.93-6.67,13.59-16.58,13.59A32.76,32.76,0,0,1,374.65,79.9Z"/>
    <path fill="#0a96b2" d="M413.06,30.23h14.25V50c2.63-3.37,6.38-6.45,12.16-6.45,8.62,0,13.8,5.7,13.8,14.93V85H439V63c0-4.43-2.33-6.83-5.7-6.83s-6,2.4-6,6.83V85H413.06Z"/>
    <path fill="#0a96b2" d="M62.25,0a62.25,62.25,0,1,0,62.24,62.25A62.31,62.31,0,0,0,62.25,0Zm0,109.51a47.27,47.27,0,1,1,47.26-47.26A47.32,47.32,0,0,1,62.25,109.51Z"/>
    <polygon fill="#0a96b2" points="54.36 32.05 75.56 85.08 91.29 85.08 70.09 32.05 54.36 32.05"/>
    <polygon fill="#0a96b2" points="33.21 85.08 48.94 85.08 58.73 60.59 42.99 60.59 33.21 85.08"/>
  </svg>

  <div class="eyebrow">Cloudchipr SF Activation</div>
  <h1>BA Lead Training Guide</h1>
  <p class="sub">Snowflake Summit 2026 · Moscone Center · June 1–4</p>

  <form id="gate-form">
    <input type="text" id="code-input" inputmode="numeric" maxlength="4" placeholder="Enter access code" autocomplete="off" autofocus>
    <p class="error-msg" id="error-msg">Incorrect code. Contact Kimberly for access.</p>
    <button type="submit">Access Training Guide →</button>
  </form>

  <p class="footer-note">Confidential — Internal Use Only · Air Fresh Marketing</p>
</div>

<script>
  var ACCESS_CODE = '2222';
  var form = document.getElementById('gate-form');
  var input = document.getElementById('code-input');
  var errorMsg = document.getElementById('error-msg');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    if (input.value === ACCESS_CODE) {
      window.location.href = '/training/cloudchipr-sf.html';
    } else {
      input.classList.add('error');
      input.classList.add('shake');
      errorMsg.classList.add('show');
      input.value = '';
      setTimeout(function() {
        input.classList.remove('shake');
      }, 600);
      setTimeout(function() {
        input.classList.remove('error');
        errorMsg.classList.remove('show');
      }, 2500);
    }
  });
</script>
</body>
</html>
